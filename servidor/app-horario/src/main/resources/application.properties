spring.application.name=app-horario

# Puerto del Backend
server.port=8081

# --- CONFIGURACION DE BASE DE DATOS (DOCKER REMOTO) ---
# Asegurate de tener la dependencia mariadb-java-client en el pom.xml
spring.datasource.url=jdbc:mariadb://94.143.141.29:3307/app-horario
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Configuracion de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# --- OPTIMIZACION DE LOGS (Modo Silencioso) ---
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO

# --- OPTIMIZACION DE VELOCIDAD (Batch Fetching) ---
spring.jpa.properties.hibernate.default_batch_fetch_size=200
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# --- INICIALIZACION DE DATOS ---
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# SEGURIDAD JWT
# Nota: Ahora mismo tu JwtService usa una clave hardcodeada en el codigo Java.
# Esta linea de abajo no hace nada a menos que cambiemos el codigo Java para leerla.
jwt.secretKey=XXXYYY

# --- CACHE DE SEGUNDO NIVEL (L2 Cache) ---
# Requiere dependencias hibernate-jcache y ehcache en el pom.xml
spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.cache.use_query_cache=true
spring.jpa.properties.hibernate.cache.region.factory_class=org.hibernate.cache.jcache.internal.JCacheRegionFactory
spring.jpa.properties.hibernate.generate_statistics=false